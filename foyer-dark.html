<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Dark Foyer | Mystery Chamber</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="index.css" />
    <style>
        /* Dark Foyer Scene */
        .dark-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 2s ease;
        }

        .scene-title {
            position: absolute;
            top: 2rem;
            text-align: center;
            z-index: 10;
            opacity: 0.3;
        }

        .chapter-tag {
            color: var(--primary);
            font-size: 0.875rem;
            font-weight: bold;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .scene-name {
            font-size: 2.5rem;
            font-weight: bold;
            margin-top: 0.5rem;
            color: var(--text-white);
        }

        .scene-instruction {
            position: absolute;
            bottom: 3rem;
            text-align: center;
            color: rgba(148, 163, 184, 0.5);
            font-size: 1rem;
            max-width: 600px;
            padding: 0 2rem;
            z-index: 10;
        }

        /* Dark Foyer Container */
        .foyer-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Moonlight from Doorway */
        .moonlight {
            position: absolute;
            left: 10%;
            top: 0;
            width: 200px;
            height: 100%;
            background: linear-gradient(to right,
                rgba(200, 200, 220, 0.1) 0%,
                rgba(200, 200, 220, 0.05) 50%,
                transparent 100%);
            transform: skewX(-10deg);
            pointer-events: none;
        }

        /* Light Switch Silhouette */
        .light-switch-area {
            position: absolute;
            right: 30%;
            top: 45%;
            transform: translateY(-50%);
        }

        #light-check {
            display: none;
        }

        .light-switch {
            position: relative;
            width: 80px;
            height: 120px;
            background: rgba(50, 50, 60, 0.3);
            border: 2px solid rgba(100, 100, 120, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .light-switch:hover {
            background: rgba(70, 70, 80, 0.4);
            border-color: rgba(232, 186, 48, 0.3);
            box-shadow: 0 0 20px rgba(232, 186, 48, 0.2);
        }

        .switch-toggle {
            width: 40px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(150, 150, 160, 0.4) 0%, rgba(100, 100, 110, 0.6) 100%);
            border-radius: 4px;
            position: relative;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .switch-toggle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 40px;
            background: rgba(80, 80, 90, 0.8);
            border-radius: 2px;
        }

        /* Switch Flipped */
        #light-check:checked ~ .foyer-container .switch-toggle {
            transform: rotateX(180deg);
        }

        /* Hint Glow */
        .light-switch::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            background: radial-gradient(circle, rgba(232, 186, 48, 0.2) 0%, transparent 70%);
            animation: hintPulse 3s infinite;
            pointer-events: none;
        }

        @keyframes hintPulse {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(1.1);
            }
        }

        /* Room Illumination */
        #light-check:checked ~ .dark-scene {
            background: linear-gradient(to bottom, #211d11 0%, #1a1610 100%);
        }

        /* Revealed Room Elements */
        .room-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease;
        }

        #light-check:checked ~ .foyer-container .room-elements {
            opacity: 1;
            pointer-events: all;
        }

        /* Grand Staircase (Blocked) */
        .staircase {
            position: absolute;
            left: 50%;
            top: 20%;
            transform: translateX(-50%);
            width: 400px;
            height: 300px;
        }

        .stairs {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .stair-step {
            position: absolute;
            width: 100%;
            height: 40px;
            background: linear-gradient(to bottom, #3a2f1b 0%, #2a1f0b 100%);
            border: 2px solid #1a1308;
        }

        .stair-step:nth-child(1) { bottom: 0; }
        .stair-step:nth-child(2) { bottom: 35px; width: 95%; left: 2.5%; }
        .stair-step:nth-child(3) { bottom: 70px; width: 90%; left: 5%; }
        .stair-step:nth-child(4) { bottom: 105px; width: 85%; left: 7.5%; }

        /* Debris Blocking Stairs */
        .debris {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 200px;
            background: linear-gradient(135deg, rgba(60, 50, 40, 0.8) 0%, rgba(40, 30, 20, 0.9) 100%);
            clip-path: polygon(20% 0%, 80% 0%, 100% 30%, 90% 100%, 10% 100%, 0% 30%);
            border: 2px solid rgba(232, 186, 48, 0.1);
        }

        .debris::after {
            content: 'BLOCKED';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(232, 186, 48, 0.3);
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.2em;
        }

        /* Inner Door (Bottom Right) */
        .inner-door {
            position: absolute;
            right: 10%;
            bottom: 15%;
            width: 180px;
            height: 280px;
            background: linear-gradient(135deg, #2a2520 0%, #1a1510 100%);
            border: 4px solid #0a0a08;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .door-lock {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 60px;
            background: linear-gradient(to bottom, #1a1a1a 0%, #0a0a0a 100%);
            border: 2px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: bold;
        }

        .door-lock::before {
            content: '🔒';
            font-size: 1.5rem;
        }

        /* Proceed Button */
        .proceed-link {
            position: absolute;
            bottom: 3rem;
            padding: 1rem 2rem;
            background: var(--primary);
            color: var(--background-dark);
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 10px 30px rgba(232, 186, 48, 0.4);
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        .proceed-link:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(232, 186, 48, 0.6);
        }

        #light-check:checked ~ .dark-scene .proceed-link {
            animation: fadeInProceed 1s ease 2s forwards;
        }

        @keyframes fadeInProceed {
            to {
                opacity: 1;
                pointer-events: all;
            }
        }

        /* Wall Texture */
        .wall {
            position: absolute;
            width: 100%;
            height: 100%;
            background:
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 100px,
                    rgba(232, 186, 48, 0.02) 100px,
                    rgba(232, 186, 48, 0.02) 101px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 100px,
                    rgba(232, 186, 48, 0.02) 100px,
                    rgba(232, 186, 48, 0.02) 101px
                );
            pointer-events: none;
        }

        /* Ambient Dust Particles */
        .dust {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(232, 186, 48, 0.2);
            border-radius: 50%;
            opacity: 0;
        }

        #light-check:checked ~ .foyer-container .dust {
            animation: dustFloat 15s infinite;
        }

        .dust:nth-child(1) { left: 15%; top: 20%; animation-delay: 0s; }
        .dust:nth-child(2) { left: 35%; top: 40%; animation-delay: 3s; }
        .dust:nth-child(3) { left: 55%; top: 60%; animation-delay: 6s; }
        .dust:nth-child(4) { left: 75%; top: 30%; animation-delay: 9s; }
        .dust:nth-child(5) { left: 85%; top: 70%; animation-delay: 12s; }

        @keyframes dustFloat {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            50% {
                transform: translateY(-150px) translateX(30px);
                opacity: 0.4;
            }
            90% {
                opacity: 0.6;
            }
        }
    </style>
</head>
<body>
    <input type="checkbox" id="light-check" />

    <div class="dark-scene">
        <!-- Scene Title -->
        <div class="scene-title">
            <div class="chapter-tag">Chapter One: The Foyer</div>
            <h1 class="scene-name">The Darkness</h1>
        </div>

        <!-- Main Foyer Container -->
        <div class="foyer-container">
            <!-- Moonlight Effect -->
            <div class="moonlight"></div>

            <!-- Wall Texture -->
            <div class="wall"></div>

            <!-- Dust Particles (visible when lit) -->
            <div class="dust"></div>
            <div class="dust"></div>
            <div class="dust"></div>
            <div class="dust"></div>
            <div class="dust"></div>

            <!-- Light Switch -->
            <div class="light-switch-area">
                <label for="light-check" class="light-switch">
                    <div class="switch-toggle"></div>
                </label>
            </div>

            <!-- Room Elements (Hidden until light is on) -->
            <div class="room-elements">
                <!-- Grand Staircase -->
                <div class="staircase">
                    <div class="stairs">
                        <div class="stair-step"></div>
                        <div class="stair-step"></div>
                        <div class="stair-step"></div>
                        <div class="stair-step"></div>
                    </div>
                    <div class="debris"></div>
                </div>

                <!-- Inner Locked Door -->
                <div class="inner-door">
                    <div class="door-lock"></div>
                </div>
            </div>
        </div>

        <!-- Scene Instructions -->
        <div class="scene-instruction">
            Darkness shrouds the path. Find a light source.
        </div>

        <!-- Proceed Link (appears after light is on) -->
        <a href="foyer-lit.html" class="proceed-link">Explore the Foyer &rarr;</a>
    </div>
</body>
</html>
