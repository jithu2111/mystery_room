<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Victorian Study | Mystery Chamber</title>
    <meta name="description"
        content="An immersive web-based escape room experience. Solve puzzles, find clues, and escape the Mystery Chamber." />
    <!-- Preconnect to Google Fonts to speed up FCP -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload Critical Hero Image -->
    <link rel="preload" href="../../assets/images/Victorian_Study.png" as="image" />
    <link rel="stylesheet" href="../../index.css" />
</head>

<body class="foyer-page">
    <div class="app-container">
        <!-- Top Navigation Bar -->
        <header class="navbar">
            <div class="navbar-content">
                <a href="../../index.html" class="logo" style="text-decoration: none;">
                    <div class="logo-icon">M</div>
                    <h1 class="logo-text">Mystery Chamber</h1>
                </a>
            </div>
        </header>

        <main class="main-content foyer-main">
            <div class="foyer-layout">
                <!-- Room Preview - Left Side -->
                <div class="room-preview-container">
                    <img src="../../assets/images/Victorian_Study.png" alt="The Victorian Study"
                        class="foyer-hero-img" />
                </div>

                <!-- Room Info - Right Side -->
                <div class="room-content">
                    <div class="room-details">
                        <span class="chapter-label">CHAPTER TWO</span>
                        <h2 class="room-title">Escape Room: <span class="highlight">The Victorian Study</span></h2>
                        <p class="room-description">
                            Uncover secrets hidden within a panoramic 19th-century study filled with mechanical wonders
                            and dusty journals. The mechanism of truth awaits.
                        </p>

                        <a href="study.html" class="primary-btn adventure-btn"
                            style="text-decoration: none; display: inline-block;">Begin Adventure &rarr;</a>
                    </div>

                    <!-- Room Stats -->
                    <div class="room-stats-divider"></div>
                    <div class="room-stats-grid">
                        <div class="stat-item">
                            <span class="stat-label">EST. TIME</span>
                            <span class="stat-value">75 Min</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">DIFFICULTY</span>
                            <span class="stat-value">Medium</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer-bottom">
            &copy; 2024 MYSTERY CHAMBER
        </footer>
    </div>
</body>

</html>
