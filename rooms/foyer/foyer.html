<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Foyer | Mystery Chamber</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../../index.css" />
</head>

<body class="foyer-page">
    <div class="app-container">
        <!-- Top Navigation Bar -->
        <header class="navbar">
            <div class="navbar-content">
                <a href="../../index.html" class="logo" style="text-decoration: none;">
                    <div class="logo-icon">M</div>
                    <h1 class="logo-text">Mystery Chamber</h1>
                </a>
            </div>
        </header>

        <main class="main-content foyer-main">
            <div class="foyer-layout">
                <!-- Room Preview - Left Side -->
                <div class="room-preview-container">
                    <img src="../../assets/images/Foyer.png" alt="The Foyer Door" class="foyer-hero-img" />
                </div>

                <!-- Room Info - Right Side -->
                <div class="room-content">
                    <div class="room-details">
                        <span class="chapter-label">CHAPTER ONE</span>
                        <h2 class="room-title">Escape Room: <span class="highlight">The Foyer</span></h2>
                        <p class="room-description">
                            The air is thin and cold. Dust dances in a single sliver of moonlight. The heavy oak door
                            behind you has no handle, and the path forward is shrouded in mystery.
                        </p>

                        <a href="foyer-porch.html" class="primary-btn adventure-btn"
                            style="text-decoration: none; display: inline-block;">Begin Adventure &rarr;</a>
                    </div>

                    <!-- Room Stats -->
                    <div class="room-stats-divider"></div>
                    <div class="room-stats-grid">
                        <div class="stat-item">
                            <span class="stat-label">EST. TIME</span>
                            <span class="stat-value">45 Min</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">DIFFICULTY</span>
                            <span class="stat-value">Medium</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer-bottom">
            &copy; 2024 MYSTERY CHAMBER
        </footer>
    </div>
</body>

</html>
