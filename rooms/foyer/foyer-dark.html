<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Dark Foyer | Mystery Chamber</title>
    <meta
      name="description"
      content="An immersive web-based escape room experience. Solve puzzles, find clues, and escape the Mystery Chamber."
    />
    <!-- Preconnect to Google Fonts to speed up FCP -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../index.css" />
    <style>
      /* Container for the whole scene with a cinematic black background */
      .dark-scene-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: background 3s ease;
      }

      /* The actual image container that scales but maintains aspect ratio */
      .dark-image-layer {
        position: relative;
        /* Aspect ratio 1/1 because Foyer.png is square */
        aspect-ratio: 1 / 1;
        width: 100%;
        /* Constrain to screen size and cap at 800px to preserve clarity */
        max-width: min(90vh, 100vw, 800px);
        background-image: url("../../assets/images/foyer/Foyer.png");
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        /* Initially very dark, heavy contrast, desaturated */
        filter: brightness(0.15) contrast(1.5) grayscale(0.8) sepia(0.3)
          hue-rotate(180deg);
        transition: filter 3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow:
          0 0 100px rgba(0, 0, 0, 0.95),
          inset 0 0 60px rgba(0, 0, 0, 0.8);
        border-radius: 8px;
      }

      /* Overlay for absolute blackness where moonlight doesn't hit */
      .dark-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle at 10% 50%,
          transparent 0%,
          rgba(0, 0, 0, 0.95) 100%
        );
        pointer-events: none;
        transition: opacity 3s ease;
        z-index: 5;
      }

      .scene-title {
        position: absolute;
        top: 2rem;
        text-align: center;
        z-index: 20;
        opacity: 0.5;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 1);
        transition: opacity 2s ease;
      }

      .chapter-tag {
        color: var(--primary);
        font-size: 0.875rem;
        font-weight: bold;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .scene-name {
        font-size: 2.5rem;
        font-weight: bold;
        margin-top: 0.5rem;
        color: var(--text-white);
      }

      .scene-instruction {
        position: absolute;
        bottom: 3rem;
        text-align: center;
        color: rgba(255, 255, 255, 0.5);
        font-size: 1.1rem;
        max-width: 600px;
        padding: 0 2rem;
        z-index: 20;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 1);
        background: rgba(10, 10, 10, 0.6);
        padding: 1rem 2rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: opacity 1s ease;
      }

      /* Dark Foyer Container */
      .foyer-interactive-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
      }

      /* Moonlight from Doorway (Matches the radial gradient overlay) */
      .moonlight-beam {
        position: absolute;
        left: -10%;
        top: 0;
        width: 40vw;
        height: 100vh;
        background: linear-gradient(
          105deg,
          rgba(180, 200, 255, 0.15) 0%,
          rgba(180, 200, 255, 0.05) 40%,
          transparent 70%
        );
        pointer-events: none;
        transform-origin: left center;
        animation: moonSway 10s infinite alternate ease-in-out;
        mix-blend-mode: screen;
        transition: opacity 2s ease;
      }

      @keyframes moonSway {
        0% {
          transform: scaleX(1) skewX(-5deg);
          opacity: 0.8;
        }

        100% {
          transform: scaleX(1.1) skewX(-8deg);
          opacity: 1;
        }
      }

      /* Light Switch UI Overlay */
      .light-switch-wrapper {
        position: absolute;
        right: 8%;
        /* Placed on the wall on the right side of the image */
        top: 45%;
        transform: translateY(-50%);
        z-index: 15;
      }

      #light-check {
        display: none;
      }

      .light-switch {
        position: relative;
        width: 70px;
        height: 110px;
        background: linear-gradient(to bottom, #dedede 0%, #a0a0a0 100%);
        border: 3px solid #666;
        border-radius: 8px;
        cursor: pointer;
        box-shadow:
          inset 0 0 10px rgba(0, 0, 0, 0.5),
          0 10px 20px rgba(0, 0, 0, 0.8),
          -5px 5px 15px rgba(0, 0, 0, 0.9);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        /* Give it a slight angle to match wall perspective */
        transform: perspective(500px) rotateY(-10deg);
      }

      /* The actual switch toggle */
      .switch-toggle {
        width: 30px;
        height: 50px;
        background: linear-gradient(to bottom, #f0f0f0 0%, #cccccc 100%);
        border-radius: 4px;
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.6);
        position: relative;
        transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateY(15px) rotateX(20deg);
        /* State: OFF (down) */
      }

      /* The little nub on the switch */
      .switch-toggle::before {
        content: "";
        position: absolute;
        top: 5px;
        left: 5px;
        right: 5px;
        height: 10px;
        background: rgba(255, 255, 255, 0.8);
        border-radius: 2px;
      }

      /* Switch Flipped (ON) */
      #light-check:checked ~ .foyer-interactive-layer .switch-toggle {
        transform: translateY(-15px) rotateX(-20deg);
        /* State: ON (up) */
        box-shadow: 0 -5px 10px rgba(0, 0, 0, 0.6);
      }

      /* Hint Glow for the switch */
      .light-switch::after {
        content: "";
        position: absolute;
        top: -20px;
        right: -20px;
        bottom: -20px;
        left: -20px;
        border-radius: 20px;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.1) 0%,
          transparent 70%
        );
        animation: hintPulseDark 4s infinite;
        pointer-events: none;
        z-index: -1;
      }

      @keyframes hintPulseDark {
        0%,
        100% {
          opacity: 0.1;
          transform: scale(0.9);
        }

        50% {
          opacity: 0.5;
          transform: scale(1.1);
        }
      }

      /* --- STATE CHANGES WHEN LIGHT IS ON --- */

      /* 1. Remove the dark filter from the background image */
      #light-check:checked ~ .dark-scene-bg .dark-image-layer {
        /* Keep it slightly moody, but full color and brightness */
        filter: brightness(0.9) contrast(1.1) grayscale(0) sepia(0.1)
          hue-rotate(0deg);
      }

      /* 2. Fade out the absolute black overlay */
      #light-check:checked ~ .dark-scene-bg .dark-overlay {
        opacity: 0;
      }

      /* 3. Fade out moonlight (overpowered by interior lights) */
      #light-check:checked ~ .dark-scene-bg .moonlight-beam {
        opacity: 0.1;
      }

      /* 4. Update title */
      #light-check:checked ~ .dark-scene-bg .scene-title {
        opacity: 1;
      }

      /* 5. Hide instructions */
      #light-check:checked ~ .dark-scene-bg .scene-instruction {
        opacity: 0;
        pointer-events: none;
      }

      /* Proceed Link (appears after light is on) */
      .proceed-link-container {
        position: absolute;
        bottom: 4rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }

      .proceed-link {
        padding: 1.25rem 3rem;
        background: rgba(10, 10, 10, 0.8);
        color: var(--primary);
        border: 2px solid var(--primary);
        text-decoration: none;
        border-radius: 0.5rem;
        font-weight: bold;
        font-size: 1.25rem;
        box-shadow: 0 0 20px rgba(232, 186, 48, 0.2);
        transition: all 0.3s ease;
        opacity: 0;
        pointer-events: none;
        transform: translateY(20px);
        backdrop-filter: blur(5px);
      }

      .proceed-link:hover {
        transform: translateY(20px) scale(1.05);
        background: rgba(232, 186, 48, 0.1);
        box-shadow: 0 0 40px rgba(232, 186, 48, 0.4);
        text-shadow: 0 0 10px rgba(232, 186, 48, 1);
      }

      #light-check:checked ~ .dark-scene-bg .proceed-link {
        animation: slideUpFade 1s ease 1.5s forwards;
        pointer-events: auto;
      }

      @keyframes slideUpFade {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .proceed-hint {
        color: rgba(255, 255, 255, 0.8);
        font-size: 1rem;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 1);
        opacity: 0;
        pointer-events: none;
      }

      #light-check:checked ~ .dark-scene-bg .proceed-hint {
        animation: fadeInProceed 1s ease 2s forwards;
      }

      @keyframes fadeInProceed {
        to {
          opacity: 1;
        }
      }

      /* Ambient Dust Particles */
      .dust {
        position: absolute;
        width: 3px;
        height: 3px;
        background: rgba(200, 220, 255, 0.6);
        /* Cool moonlight color initially */
        border-radius: 50%;
        opacity: 0;
        filter: blur(1px);
        transition: background 2s ease;
      }

      .dark-scene-bg .dust {
        animation: dustFloat 15s infinite;
      }

      /* When lit, dust becomes warm colored */
      #light-check:checked ~ .dark-scene-bg .dust {
        background: rgba(255, 230, 150, 0.4);
        box-shadow: 0 0 5px rgba(255, 230, 150, 0.8);
      }

      .dust:nth-child(1) {
        left: 15%;
        top: 20%;
        animation-delay: 0s;
      }

      .dust:nth-child(2) {
        left: 35%;
        top: 40%;
        animation-delay: 3s;
      }

      .dust:nth-child(3) {
        left: 55%;
        top: 60%;
        animation-delay: 6s;
      }

      .dust:nth-child(4) {
        left: 75%;
        top: 30%;
        animation-delay: 9s;
      }

      .dust:nth-child(5) {
        left: 25%;
        top: 70%;
        animation-delay: 12s;
      }

      @keyframes dustFloat {
        0%,
        100% {
          transform: translateY(0) translateX(0);
          opacity: 0;
        }

        10% {
          opacity: 0.8;
        }

        50% {
          transform: translateY(-100px) translateX(20px);
          opacity: 0.5;
        }

        90% {
          opacity: 0.8;
        }
      }
    </style>
  </head>

  <body>
    <input type="checkbox" id="light-check" />

    <div class="dark-scene-bg">
      <div class="dark-image-layer">
        <!-- Absolute Black overlay -->
        <div class="dark-overlay"></div>

        <!-- Moonlight Effect -->
        <div class="moonlight-beam"></div>

        <!-- Interactive Elements Overlay -->
        <div class="foyer-interactive-layer">
          <!-- Light Switch UI -->
          <div class="light-switch-wrapper">
            <label for="light-check" class="light-switch" title="Turn on light">
              <div class="switch-toggle"></div>
            </label>
          </div>
        </div>
      </div>

      <!-- Dust Particles (outside the image box so they float around the whole screen) -->
      <div class="dust"></div>
      <div class="dust"></div>
      <div class="dust"></div>
      <div class="dust"></div>
      <div class="dust"></div>

      <!-- Scene Title -->
      <div class="scene-title">
        <div class="chapter-tag">Chapter One: The Foyer</div>
        <h1 class="scene-name">The Darkness</h1>
      </div>

      <!-- Scene Instructions -->
      <div class="scene-instruction">
        Total darkness shrouds the path ahead. There must be a light switch on
        the wall nearby.
      </div>

      <!-- Proceed Link Container (appears after light is on) -->
      <div class="proceed-link-container">
        <div class="proceed-hint">The room is illuminated...</div>
        <a href="foyer-lit.html" class="proceed-link"
          >Explore the Foyer &rarr;</a
        >
      </div>
    </div>
  </body>
</html>
